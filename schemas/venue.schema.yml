$schema: https://json-schema.org/draft/2020-12/schema
title: Venue metadata
type: object
required:
  - key
  - name
  - short_name
  - year
  - location
  - dates
  - start_date
  - end_date
  - website
  - type
properties:
  key:
    type: string
    minLength: 1
  name:
    type: string
    minLength: 1
  short_name:
    type: string
    minLength: 1
  year:
    type: integer
    minimum: 1900
  location:
    type: string
    minLength: 1
  dates:
    type: string
    minLength: 1
  start_date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
  end_date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
  website:
    type: string
    format: uri
  url_proceedings:
    type:
      - string
      - 'null'
    format: uri
  publisher:
    type:
      - string
      - 'null'
  type:
    type: string
    enum:
      - conference
      - workshop
      - benchmark
      - competition
additionalProperties: false
